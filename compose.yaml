# Полный стек (из репозитория eyenest-infra, рядом клоны eyenest-services и оба фронта):
#   cd eyenest-infra && cp -n .env.example .env
#   # PUBLIC_HOST и при необходимости EYENEST_*_DIR в .env
#   docker compose -f compose.yaml --env-file .env up -d --build
#
# В браузере: https://PUBLIC_HOST/  и https://PUBLIC_HOST/cam/
# Первый заход: подтвердите исключение для самоподписанного сертификата (один раз).
# Порты: 443 приложение+API, 7443 LiveKit (WSS), 8900 MinIO S3, 80 → редирект на https.

name: eyenest

include:
  - path: docker-compose.yml
  - path: docker-compose.services.yml
  - path: docker-compose.frontends.yml
  - path: docker-compose.proxy.yml
