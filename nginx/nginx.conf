worker_processes auto;

events {
    worker_connections 1024;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ─── HTTP → HTTPS redirect ───────────────────────────────────────
    server {
        listen 80 default_server;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── Main application (port 443) ─────────────────────────────────
    server {
        listen 443 ssl default_server;
        http2 on;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Camera frontend (strip /cam/ prefix)
        location /cam/ {
            proxy_pass http://camera-frontend:80/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Gateway API: /api/* → gateway:3000/* (prefix stripped)
        location /api/ {
            proxy_pass http://gateway-service:3000/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_buffering off;
            proxy_read_timeout 86400s;
        }

        # Main frontend (catch-all — SPA handles client routes)
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─── LiveKit WSS (port 7443) ─────────────────────────────────────
    # Только HTTP/1.1: WebSocket Upgrade с HTTP/2 на том же listen у Firefox/Chrome часто ломается.
    server {
        listen 7443 ssl;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://livekit:7880;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }

    # ─── MinIO S3 API (port 8900) ────────────────────────────────────
    server {
        listen 8900 ssl;
        http2 on;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        client_max_body_size 100m;

        # HLS с 443 на :8900 — cross-origin. MinIO сам шлёт CORS; nginx добавляет свои —
        # в ответе получались два Access-Control-Allow-Origin, Firefox ругается.
        location / {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  * always;
                add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
                add_header Access-Control-Allow-Headers  * always;
                add_header Access-Control-Max-Age        86400 always;
                return 204;
            }
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Expose-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Max-Age;
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            proxy_pass http://minio:9000;
            # Иначе SigV4 ломается: клиент подписывает Host «домен:8900», а $host без порта.
            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
