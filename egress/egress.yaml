# Подключение к LiveKit и Redis: ключи через env контейнера (см. docker-compose.yml egress).
# access_key/secret здесь должны совпадать с MINIO_ROOT_USER / MINIO_ROOT_PASSWORD в .env
redis:
  address: redis:6379

health_port: 8080
log_level: debug

# ws:// без TLS
insecure: true

# Один провайдер хранилища (S3-совместимый MinIO)
s3:
  access_key: minioadmin
  secret: minioadmin
  endpoint: http://minio:9000
  bucket: livekit
  force_path_style: true
