# SPA за reverse-proxy (compose.yaml). Каталоги фронтов: EYENEST_*_FRONTEND_DIR (по умолчанию eyenest-viewer-frontend, eyenest-camera-frontend).

services:
  frontend:
    build:
      context: ${EYENEST_VIEWER_FRONTEND_DIR:-../eyenest-viewer-frontend}
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - eyenest

  camera-frontend:
    build:
      context: ${EYENEST_CAMERA_FRONTEND_DIR:-../eyenest-camera-frontend}
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - eyenest
