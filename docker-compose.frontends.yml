# SPA за reverse-proxy (compose.yaml). Снаружи только 443; порты не публикуются.
# Локально без Caddy: docker compose -f docker-compose.frontend-ports.yml (см. ниже) или pnpm dev.

services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - eyenest

  camera-frontend:
    build:
      context: ../camera-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - eyenest
